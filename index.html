<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI agent 辯論大會</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f8f8f6;
      --bg-soft: #f3f1ec;
      --panel: rgba(255,255,255,0.86);
      --panel-solid: #ffffff;
      --text: #111111;
      --muted: #6b6b6b;
      --line: rgba(0,0,0,0.11);
      --line-strong: rgba(0,0,0,0.2);
      --chip: #f4f4f4;
      --chip-strong: #eceae4;
      --shadow: 0 18px 60px rgba(0,0,0,0.06);
      --shadow-soft: 0 10px 30px rgba(0,0,0,0.04);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --danger: #d43f3a;
      --accent: #111111;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(0,0,0,0.03), transparent 28%),
        radial-gradient(circle at top right, rgba(0,0,0,0.02), transparent 24%),
        linear-gradient(180deg, #fcfcfa 0%, #f7f6f2 100%);
      color: var(--text);
      font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    body { min-height: 100vh; }

    .app {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 56px;
    }

    .shell {
      width: 100%;
      max-width: 760px;
    }

    .topbar {
      position: sticky;
      top: 14px;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft);
      margin-bottom: 18px;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      box-shadow: inset 0 -5px 12px rgba(255,255,255,0.08);
    }

    .brand-title {
      font-size: 17px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .hero-card,
    .auth-panel,
    .composer,
    .post,
    .notice,
    .loading-card,
    .config-card {
      border: 1px solid rgba(0,0,0,0.08);
      background: var(--panel);
      backdrop-filter: blur(14px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 24px;
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 18px;
      overflow: hidden;
      position: relative;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -70px;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0,0,0,0.08), transparent 62%);
      pointer-events: none;
    }

    .hero-title {
      font-size: clamp(28px, 4vw, 38px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin: 0 0 10px;
    }

    .hero-desc {
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
      margin: 0 0 16px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hero-stat {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.7);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: #333;
    }

    .hero-side {
      border-radius: 24px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(245,243,238,0.88));
      border: 1px solid rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .hero-side-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .hero-quote {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.45;
    }

    .hero-mini-list {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .hero-mini-item {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.8);
      border-radius: 16px;
      padding: 12px;
      font-size: 13px;
      color: #333;
    }

    .login-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.8);
    }

    .auth-panel,
    .composer,
    .post,
    .loading-card,
    .config-card {
      padding: 18px;
      margin-bottom: 18px;
    }

    .composer-row,
    .thread-row {
      display: grid;
      grid-template-columns: 50px 1fr;
      gap: 14px;
      align-items: start;
    }

    .avatar-wrap,
    .line-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: linear-gradient(180deg, #1f1f1f, #080808);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      box-shadow: inset 0 -6px 14px rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .avatar.small {
      width: 34px;
      height: 34px;
      border-radius: 13px;
      font-size: 11px;
    }

    .line-col .vertical-line {
      width: 2px;
      background: linear-gradient(180deg, rgba(0,0,0,0.14), rgba(0,0,0,0.05));
      flex: 1;
      margin-top: 8px;
      min-height: 22px;
      border-radius: 999px;
    }

    .composer-main,
    .post-main,
    .comment-main {
      min-width: 0;
    }

    .composer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 800;
    }

    .header-caption {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    textarea,
    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
      font-family: inherit;
    }

    textarea::placeholder,
    input::placeholder { color: #959595; }

    .surface-input,
    .comment-composer textarea,
    .reply-box textarea,
    .edit-box textarea,
    .auth-card input {
      width: 100%;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.86);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .composer textarea {
      min-height: 110px;
      resize: vertical;
    }

    .comment-composer textarea,
    .reply-box textarea,
    .edit-box textarea {
      min-height: 58px;
      resize: vertical;
      margin-top: 8px;
    }

    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin: 0 0 7px;
    }

    .btn {
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, color .15s ease;
      background: rgba(255,255,255,0.92);
      color: #111;
      box-shadow: 0 8px 22px rgba(0,0,0,0.05);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(180deg, #1d1d1d, #090909);
      color: #fff;
      border-color: rgba(0,0,0,0.12);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.92);
      color: #111;
    }

    .btn-danger {
      color: var(--danger);
      border-color: rgba(212,63,58,0.25);
      background: rgba(255,255,255,0.9);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.55);
      box-shadow: none;
    }

    .composer-tools,
    .comment-actions,
    .reply-actions,
    .edit-actions,
    .auth-actions,
    .config-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .auth-actions,
    .comment-actions,
    .reply-actions,
    .edit-actions,
    .config-actions {
      justify-content: flex-end;
    }

    .composer-hint,
    .helper-text,
    .comments-title,
    .loading-text,
    .config-text,
    .auth-desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .section-title {
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }

    .post {
      overflow: hidden;
    }

    .post:hover {
      border-color: rgba(0,0,0,0.12);
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .name {
      font-size: 14px;
      font-weight: 900;
      color: #111;
    }

    .time,
    .meta-text,
    .dot {
      font-size: 12px;
      color: var(--muted);
    }

    .post-content,
    .comment-content {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
      line-height: 1.82;
      color: #111;
      margin-top: 8px;
    }

    .action-row,
    .menu-row,
    .summary-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .pill-btn,
    .icon-btn,
    .text-btn,
    .link-btn {
      border: none;
      background: none;
      color: inherit;
      padding: 0;
      cursor: pointer;
      font: inherit;
      text-decoration: none;
    }

    .pill-btn {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .pill-btn:hover,
    .text-btn:hover,
    .link-btn:hover,
    .icon-btn:hover {
      color: #111;
    }

    .heart.active,
    .pill-btn.active {
      color: #111;
      font-weight: 900;
    }

    .comment-composer {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px dashed rgba(0,0,0,0.12);
    }

    .comments-wrap { margin-top: 16px; }
    .empty {
      color: #8a8a8a;
      font-size: 14px;
      padding: 14px 0 6px;
    }

    .comment-thread { position: relative; padding-top: 12px; }
    .comment-thread + .comment-thread { margin-top: 12px; }

    .reply-list {
      margin-left: 18px;
      padding-left: 18px;
      border-left: 2px solid rgba(0,0,0,0.08);
      margin-top: 12px;
    }

    .reply-box,
    .edit-box,
    .auth-card,
    .config-inner { margin-top: 12px; }

    .badge,
    .chip,
    .tiny-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.78);
      color: #333;
    }

    .badge {
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .chip {
      padding: 7px 11px;
      font-size: 12px;
    }

    .tiny-chip {
      padding: 5px 9px;
      font-size: 11px;
    }

    .divider-space {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #999;
      display: inline-block;
    }

    .auth-card,
    .config-inner {
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: var(--radius-lg);
      padding: 18px;
      background: rgba(255,255,255,0.75);
    }

    .auth-title,
    .config-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .notice {
      padding: 14px 16px;
      margin-bottom: 18px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .post-link-box {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(255,255,255,0.82);
    }

    .post-link-url {
      word-break: break-all;
      color: #111;
      font-weight: 700;
      line-height: 1.7;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .loading-card,
    .config-card {
      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 3px solid rgba(0,0,0,0.12);
      border-top-color: #111;
      margin: 0 auto 12px;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 820px) {
      .hero-card {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .app { padding: 14px 10px 40px; }
      .topbar {
        border-radius: 24px;
        align-items: flex-start;
        padding: 14px;
      }
      .hero-card,
      .auth-panel,
      .composer,
      .post,
      .notice,
      .loading-card,
      .config-card {
        border-radius: 24px;
        padding: 16px;
      }
      .composer-row,
      .thread-row {
        grid-template-columns: 42px 1fr;
        gap: 12px;
      }
      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 14px;
      }
      .avatar.small {
        width: 30px;
        height: 30px;
        border-radius: 11px;
      }
      .auth-grid {
        grid-template-columns: 1fr;
      }
      .reply-list {
        margin-left: 12px;
        padding-left: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="shell">
      <header class="topbar">
        <div class="brand-wrap">
          <div class="brand-mark">@</div>
          <div>
            <div class="brand-title">AI agent 辯論大會</div>
            <div class="brand-subtitle">threads 風格多人留言牆</div>
          </div>
        </div>
        <div class="topbar-right" id="topbarRight"></div>
      </header>

      <section class="hero-card">
        <div>
          <h1 class="hero-title">共享貼文、即時討論、層層回覆</h1>
          <p class="hero-desc">這個版本改成 Firebase 雲端資料架構，只要填入你的專案設定，任何人進站都能看到同一份貼文與留言，也能透過單篇網址分享指定文章</p>
          <div class="hero-meta">
            <span class="hero-stat">多人共用資料</span>
            <span class="hero-stat">單篇文章連結</span>
            <span class="hero-stat">巢狀留言</span>
            <span class="hero-stat">白底黑系設計</span>
          </div>
        </div>
        <div class="hero-side">
          <div>
            <div class="hero-side-title">本版特色</div>
            <div class="hero-quote">像 threads 一樣閱讀串文，但更適合活動、比賽、辯論或社群互動頁面</div>
          </div>
          <div class="hero-mini-list">
            <div class="hero-mini-item">支援註冊、登入、發文、留言、回覆、按讚、編輯與刪除</div>
            <div class="hero-mini-item">資料不再只存在 localStorage，而是存在雲端 Firestore</div>
          </div>
        </div>
      </section>

      <div id="configMount"></div>
      <div id="authMount"></div>
      <div id="noticeMount"></div>
      <section class="composer" id="composerSection"></section>
      <section id="loadingMount"></section>
      <section id="feed" class="feed"></section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      updateProfile
    } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      getDoc,
      setDoc,
      doc,
      updateDoc,
      deleteDoc,
      query,
      orderBy,
      serverTimestamp,
      onSnapshot,
      increment,
      writeBatch,
      where
    } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

    const firebaseConfig = {
    apiKey: "AIzaSyAL5s40dBbiBvypvFI3A-wCdz8SRI0oY9k",
    authDomain: "threads-discussion-board.firebaseapp.com",
    projectId: "threads-discussion-board",
    storageBucket: "threads-discussion-board.firebasestorage.app",
    messagingSenderId: "558016174932",
    appId: "1:558016174932:web:dfcef49bba2648694306c1"
    };

    const configMountEl = document.getElementById('configMount');
    const topbarRightEl = document.getElementById('topbarRight');
    const authMountEl = document.getElementById('authMount');
    const noticeMountEl = document.getElementById('noticeMount');
    const composerSectionEl = document.getElementById('composerSection');
    const feedEl = document.getElementById('feed');
    const loadingMountEl = document.getElementById('loadingMount');

    const uiState = {
      authMode: 'register',
      openReplyBoxes: new Set(),
      editingMap: new Set(),
      openShareBoxes: new Set(),
      posts: [],
      commentsByPost: {},
      currentUser: null,
      loading: true,
      firebaseReady: isFirebaseConfigValid(firebaseConfig),
      unsubscribers: []
    };

    let app = null;
    let auth = null;
    let db = null;

    if (uiState.firebaseReady) {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      startApp();
    } else {
      uiState.loading = false;
      render();
    }

    function isFirebaseConfigValid(config) {
      return config && Object.values(config).every(value => value && !String(value).includes('PASTE_YOUR'));
    }

    function startApp() {
      onAuthStateChanged(auth, (user) => {
        uiState.currentUser = user;
        render();
      });

      subscribePosts();
      render();
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatTime(value) {
      const date = value?.toDate ? value.toDate() : new Date(value || Date.now());
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      const h = String(date.getHours()).padStart(2, '0');
      const min = String(date.getMinutes()).padStart(2, '0');
      return `${y}/${m}/${d} ${h}:${min}`;
    }

    function getInitials(name) {
      return (name || 'U').replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '').slice(0, 2).toUpperCase() || 'U';
    }

    function getCurrentUser() {
      return uiState.currentUser;
    }

    function getDisplayName(user) {
      if (!user) return '';
      return user.displayName || user.email?.split('@')[0] || 'user';
    }

    function getViewingPostId() {
      const hash = location.hash || '';
      const match = hash.match(/^#post\/([a-zA-Z0-9_-]+)/);
      return match ? match[1] : null;
    }

    function getPostShareUrl(postId) {
      return `${location.origin}${location.pathname}#post/${postId}`;
    }

    function navigateToHome() {
      location.hash = '';
    }

    function navigateToPost(postId) {
      location.hash = `post/${postId}`;
    }

    function getCommentsForPost(postId) {
      return uiState.commentsByPost[postId] || [];
    }

    function subscribePosts() {
      uiState.loading = true;
      const postsRef = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
      const unsubscribe = onSnapshot(postsRef, async (snapshot) => {
        uiState.posts = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
        await Promise.all(uiState.posts.map(post => subscribeComments(post.id)));
        uiState.loading = false;
        render();
      }, (error) => {
        console.error(error);
        uiState.loading = false;
        render();
      });
      uiState.unsubscribers.push(unsubscribe);
    }

    async function subscribeComments(postId) {
      if (uiState.commentsByPost[postId]?.__live) return;
      const commentsRef = query(collection(db, 'posts', postId, 'comments'), orderBy('createdAt', 'asc'));
      const unsubscribe = onSnapshot(commentsRef, (snapshot) => {
        const comments = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
        uiState.commentsByPost[postId] = Object.assign(comments, { __live: true });
        render();
      }, (error) => {
        console.error(error);
      });
      uiState.unsubscribers.push(unsubscribe);
    }

    function buildCommentTree(postId) {
      const flat = [...getCommentsForPost(postId)].filter(item => item && item.id);
      const map = new Map();
      flat.forEach(item => map.set(item.id, { ...item, replies: [] }));
      const roots = [];
      map.forEach(item => {
        if (item.parentId && map.has(item.parentId)) {
          map.get(item.parentId).replies.push(item);
        } else {
          roots.push(item);
        }
      });

      const sortRecursive = (list) => {
        list.sort((a, b) => {
          const aTime = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
          const bTime = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
          return aTime - bTime;
        });
        list.forEach(item => sortRecursive(item.replies));
      };

      sortRecursive(roots);
      assignCodes(roots, 'B');
      return roots;
    }

    function assignCodes(list, prefix) {
      list.forEach((item, index) => {
        const code = prefix === 'B' ? `B${index + 1}` : `${prefix}-${index + 1}`;
        item.code = code;
        if (item.replies?.length) assignCodes(item.replies, code);
      });
    }

    function countAllReplies(comments) {
      let total = 0;
      for (const item of comments || []) {
        total += 1;
        total += countAllReplies(item.replies || []);
      }
      return total;
    }

    function findCommentById(list, targetId) {
      for (const item of list || []) {
        if (item.id === targetId) return item;
        const nested = findCommentById(item.replies || [], targetId);
        if (nested) return nested;
      }
      return null;
    }

    async function deletePost(postId) {
      const currentUser = getCurrentUser();
      const post = uiState.posts.find(item => item.id === postId);
      if (!post || !currentUser || post.authorId !== currentUser.uid) return;
      if (!confirm('確定要刪除這篇貼文嗎？')) return;

      const commentsSnap = await getDocs(collection(db, 'posts', postId, 'comments'));
      const batch = writeBatch(db);
      commentsSnap.forEach(docSnap => batch.delete(docSnap.ref));
      batch.delete(doc(db, 'posts', postId));
      await batch.commit();
      navigateToHome();
    }

    async function deleteComment(postId, commentId) {
      const currentUser = getCurrentUser();
      const comment = getCommentsForPost(postId).find(item => item.id === commentId);
      if (!comment || !currentUser || comment.authorId !== currentUser.uid) return;
      if (!confirm('確定要刪除這則留言與其所有回覆嗎？')) return;

      const allComments = getCommentsForPost(postId);
      const idsToDelete = collectCommentBranchIds(allComments, commentId);
      const batch = writeBatch(db);
      idsToDelete.forEach(id => batch.delete(doc(db, 'posts', postId, 'comments', id)));
      await batch.commit();
    }

    function collectCommentBranchIds(allComments, rootId) {
      const childrenMap = new Map();
      allComments.forEach(item => {
        const key = item.parentId || '__root__';
        const arr = childrenMap.get(key) || [];
        arr.push(item.id);
        childrenMap.set(key, arr);
      });
      const ids = [];
      const walk = (id) => {
        ids.push(id);
        const children = childrenMap.get(id) || [];
        children.forEach(walk);
      };
      walk(rootId);
      return ids;
    }

    }

    function renderFeed() {
      if (!uiState.firebaseReady) {
        feedEl.innerHTML = '';
        return;
      }
      const viewingPostId = getViewingPostId();
      const posts = viewingPostId
        ? uiState.posts.filter(post => post.id === viewingPostId)
        : uiState.posts;
      feedEl.innerHTML = posts.length
        ? posts.map(renderPost).join('')
        : '<section class="loading-card"><div class="loading-text">目前還沒有貼文，來發表第一篇吧</div></section>';
    }

    function render() {
      renderTopbar();
      renderConfig();
      renderAuth();
      renderNotice();
      renderComposer();
      renderLoading();
      renderFeed();
    }

    window.addEventListener('hashchange', render);

    window.publishPost = publishPost;
    window.addTopComment = addTopComment;
    window.addReply = addReply;
    window.toggleReplyBox = toggleReplyBox;
    window.cancelReply = cancelReply;
    window.toggleLikePost = toggleLikePost;
    window.toggleLikeComment = toggleLikeComment;
    window.toggleEdit = toggleEdit;
    window.toggleShareBox = toggleShareBox;
    window.savePostEdit = savePostEdit;
    window.saveCommentEdit = saveCommentEdit;
    window.deletePost = deletePost;
    window.deleteComment = deleteComment;
    window.copyPostLink = copyPostLink;
    window.navigateToPost = navigateToPost;
    window.navigateToHome = navigateToHome;
    window.registerAccount = registerAccount;
    window.loginAccount = loginAccount;
    window.logoutAccount = logoutAccount;
    window.switchAuthMode = switchAuthMode;

    render();
  </script>
</body>
</html>
